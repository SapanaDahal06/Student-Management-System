<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS (optional) -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'students/css/style.css' %}">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom sidebar transition */
        .sidebar-hidden {
            transform: translateX(-100%);
        }
        @media (min-width: 768px) {
            .sidebar-hidden {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="bg-indigo-800 text-white w-64 space-y-6 py-7 px-2 absolute inset-y-0 left-0 transform transition-transform duration-300 ease-in-out z-20 md:relative md:translate-x-0">
        <div class="flex items-center justify-center space-x-2 px-4">
            <i class="fas fa-graduation-cap text-2xl"></i>
            <span class="text-2xl font-semibold">StudentMS</span>
        </div>
        <nav>
            <a href="{% url 'dashboard' %}" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-indigo-700 {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-900{% endif %}">
                <i class="fas fa-tachometer-alt w-5 mr-2"></i> Dashboard
            </a>
            <a href="{% url 'student_list' %}" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-indigo-700 {% if request.resolver_match.url_name == 'student_list' %}bg-indigo-900{% endif %}">
                <i class="fas fa-users w-5 mr-2"></i> Students
            </a>
            <a href="#" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-indigo-700">
                <i class="fas fa-calendar-check w-5 mr-2"></i> Attendance
            </a>
            <a href="#" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-indigo-700">
                <i class="fas fa-chart-line w-5 mr-2"></i> Grades
            </a>
            <a href="#" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-indigo-700">
                <i class="fas fa-dollar-sign w-5 mr-2"></i> Fees
            </a>
        </nav>
        <div class="absolute bottom-0 left-0 w-full p-4">
            <a href="#" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-indigo-700">
                <i class="fas fa-sign-out-alt w-5 mr-2"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-y-auto">
        <!-- Top Navbar -->
        <header class="bg-white shadow-md py-4 px-6 flex justify-between items-center sticky top-0 z-10">
            <button id="menuBtn" class="text-gray-600 focus:outline-none md:hidden">
                <i class="fas fa-bars text-2xl"></i>
            </button>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <i class="fas fa-bell text-gray-600 cursor-pointer"></i>
                    <span class="absolute -top-1 -right-2 bg-red-500 text-white text-xs rounded-full px-1">3</span>
                </div>
                <div class="flex items-center space-x-2 cursor-pointer">
                    <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="Avatar" class="w-8 h-8 rounded-full">
                    <span class="text-gray-700">Admin</span>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="p-6">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</div>

<!-- JavaScript for mobile sidebar toggle -->
<script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    if (menuBtn) {
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('sidebar-hidden');
        });
    }
    // When clicking outside sidebar on mobile, close it
    document.addEventListener('click', function(event) {
        if (window.innerWidth < 768) {
            const isClickInside = sidebar.contains(event.target) || menuBtn.contains(event.target);
            if (!isClickInside && !sidebar.classList.contains('sidebar-hidden')) {
                sidebar.classList.add('sidebar-hidden');
            }
        }
    });
</script>
<!-- Custom JS -->
<script src="{% static 'students/js/script.js' %}"></script>
</body>
</html>
